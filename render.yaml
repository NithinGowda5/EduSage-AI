services:
  - type: web
    name: edusage-ai
    env: docker
    plan: free
    envVars:
      - key: PORT
        value: 7860
      - key: COHERE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RENDER
        value: "true"
    # Note: To enable persistence (saving uploaded PDFs & database),
    # change "plan: free" to "plan: starter" and uncomment the disk configuration below:
    # disk:
    #   name: edusage-data
    #   mountPath: /data
    #   sizeGB: 1
